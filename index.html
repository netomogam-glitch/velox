<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox Advisor | Inteligencia Patrimonial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --text: #0a0a0a; --bg: #e6e1d9; --card: #f5f2ed; --accent: #0a0a0a; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; width: 100%; box-sizing: border-box; }
        
        .glass-card { background: var(--card); border-radius: 32px; padding: 30px; width: 100%; max-width: 1000px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 25px; box-sizing: border-box; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: clamp(2.2rem, 8vw, 4rem); margin: 0; font-weight: 800; letter-spacing: -2px; text-align: center; }
        .btn-velox { background: var(--accent); color: #e6e1d9; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 25px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } .big-number { font-size: 2.6rem !important; } }

        .control-panel { background: rgba(0,0,0,0.02); padding: 25px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; }
        .num-input { background: white; border: 1px solid rgba(0,0,0,0.1); padding: 10px; border-radius: 12px; width: 95px; text-align: center; font-size: 1.2rem; outline: none; font-weight: 600; }
        
        .result-box { text-align: center; padding: 30px; background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
        .big-number { font-size: 3.5rem; font-weight: 800; margin: 10px 0; letter-spacing: -1.5px; }
        
        .metrics-footer { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); gap: 10px; }
        .metric-item { flex: 1; text-align: center; }
        .metric-label { font-size: 0.7rem; font-weight: 800; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }
        .profit-text { color: #27ae60; }

        .chart-container { height: 320px; margin-top: 30px; width: 100%; }
        
        /* BARRA TEMPORAL OPTIMIZADA */
        .timeline-container { width: 100%; margin: 40px 0 10px 0; text-align: center; }
        #date-preview { font-size: 0.85rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .timeline-slider { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; outline: none; cursor: pointer; }
        .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 32px; height: 32px; background: #fff; border: 4px solid #000; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        
        #market-preview { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="glass-card">
        <h1>Velox Advisor</h1>
        <p style="text-align:center; font-size: 1.2rem; opacity: 0.7;">Análisis patrimonial inteligente.</p>
        <div style="text-align: center;"><button class="btn-velox" onclick="showQuiz()">Analizar Cartera</button></div>
    </div>

    <div id="quiz" class="glass-card" style="display: none; text-align: center;">
        <div id="q1">
            <h2>¿Objetivo patrimonial?</h2>
            <button onclick="next(1, 1)" style="display:block; width:100%; padding:18px; margin:10px 0; border-radius:15px; border:1px solid #ddd; cursor:pointer; font-family:inherit;">Preservar capital</button>
            <button onclick="next(1, 5)" style="display:block; width:100%; padding:18px; margin:10px 0; border-radius:15px; border:1px solid #ddd; cursor:pointer; font-family:inherit;">Crecimiento audaz</button>
        </div>
        <div id="q2" style="display:none;">
            <h2>¿Tolerancia al riesgo?</h2>
            <button onclick="next(2, 0)" style="display:block; width:100%; padding:18px; margin:10px 0; border-radius:15px; border:1px solid #ddd; cursor:pointer; font-family:inherit;">Seguridad ante todo</button>
            <button onclick="next(2, 5)" style="display:block; width:100%; padding:18px; margin:10px 0; border-radius:15px; border:1px solid #ddd; cursor:pointer; font-family:inherit;">Oportunidades IA</button>
        </div>
    </div>

    <div id="results-all" style="display: none; width: 100%; max-width: 1000px;">
        <div class="glass-card">
            <h2 style="margin:0; font-size: 0.9rem; letter-spacing: 2px; opacity: 0.4; text-align: center; font-weight: 800;">PROYECCIÓN DE PATRIMONIO</h2>
            
            <div class="stats-grid">
                <div class="control-panel">
                    <label style="font-size: 0.8rem; font-weight: 700; opacity: 0.6;">AHORRO MENSUAL (€)</label>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                        <input type="number" id="m-num" class="num-input" value="300" oninput="update()">
                        <input type="range" id="m-range" min="50" max="5000" step="50" value="300" style="flex:1; accent-color:#000;" oninput="sync('m')">
                    </div>
                </div>

                <div class="result-box">
                    <span class="metric-label">Valor Estimado</span>
                    <div id="total-val" class="big-number">0 €</div>
                    
                    <div class="metrics-footer">
                        <div class="metric-item">
                            <div class="metric-label">Invertido</div>
                            <div id="inv-val" class="metric-value">0 €</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Ganado (IA)</div>
                            <div id="profit-val" class="metric-value profit-text">+0 €</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chart-container"><canvas id="mainChart"></canvas></div>

            <div class="timeline-container">
                <span id="date-preview">RESULTADOS PARA EL AÑO 2036</span>
                <input type="range" id="y-range" min="1" max="40" value="10" class="timeline-slider" oninput="update()">
            </div>

            <div style="text-align: center;"><button class="btn-velox" onclick="showMarket()">VER ANÁLISIS EN VIVO</button></div>
        </div>
    </div>
</div>

<script>
    let score = 0, chart, rate = 0.07, startYear = 2026;

    function showQuiz() { document.getElementById('home').style.display = 'none'; document.getElementById('quiz').style.display = 'block'; }
    function next(q, p) { score += p; if(q===1){ document.getElementById('q1').style.display='none'; document.getElementById('q2').style.display='block'; } else { finish(); } }
    function finish() { document.getElementById('quiz').style.display='none'; document.getElementById('results-all').style.display='block'; rate=(score<=5)?0.05:0.11; initChart(); update(); }
    function sync(id) { document.getElementById(id+'-num').value = document.getElementById(id+'-range').value; update(); }

    function initChart() {
        chart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'line', data: { labels: [], datasets: [
                { label: 'Valor IA', data: [], borderColor: '#000', backgroundColor: 'rgba(0,0,0,0.05)', fill: true, tension: 0.4, pointRadius: 0 },
                { label: 'Inversión', data: [], borderColor: '#ccc', borderDash: [5,5], fill: false, tension: 0, pointRadius: 0 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } }
        });
    }

    function update() {
        const m = parseFloat(document.getElementById('m-num').value) || 0;
        const y = parseInt(document.getElementById('y-range').value) || 0;
        let labels = [], vData = [], iData = [], bal = 0, inv = 0;

        for (let i = 0; i <= y; i++) {
            labels.push(startYear + i); vData.push(Math.round(bal)); iData.push(inv);
            for(let mo=0; mo<12; mo++) { bal = (bal + m) * (1 + (rate/12)); inv += m; }
        }

        document.getElementById('total-val').innerText = vData[vData.length-1].toLocaleString() + " €";
        document.getElementById('inv-val').innerText = iData[iData.length-1].toLocaleString() + " €";
        document.getElementById('profit-val').innerText = "+" + (vData[vData.length-1] - iData[iData.length-1]).toLocaleString() + " €";
        document.getElementById('date-preview').innerText = "RESULTADOS PARA EL AÑO " + (startYear + y);

        chart.data.labels = labels;
        chart.data.datasets[0].data = vData;
        chart.data.datasets[1].data = iData;
        chart.update();
    }

    function showMarket() { alert("Accediendo a datos de mercado en vivo..."); }
</script>
</body>
</html>
